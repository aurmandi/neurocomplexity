{% set name = "neurocomplexity" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: REPLACE_WITH_SDIST_SHA256_AFTER_PYPI_UPLOAD

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - neurocomplexity = neurocomplexity.cli:main

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.10
    - numpy >=1.24
    - scipy >=1.10
    - pandas >=2.0
    - matplotlib-base >=3.7
    - statsmodels >=0.14
    - pynwb >=2.5
    - joblib >=1.3
    - tqdm >=4.65
    - h5py >=3.8

test:
  imports:
    - neurocomplexity
    - neurocomplexity.benchmarks
  commands:
    - neurocomplexity --version
    - python -m neurocomplexity benchmark --case pid.atoms_xor --reps 2

about:
  home: https://github.com/aurmandi/neurocomplexity
  license: MIT
  license_file: LICENSE
  summary: "Criticality, transfer entropy, autonomy, PID, and dimensionality for spike-sorted recordings."

extra:
  recipe-maintainers:
    - aurmandi
